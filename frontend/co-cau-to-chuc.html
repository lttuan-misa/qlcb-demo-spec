<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QLCB Demo - Co cau To chuc</title>
    <link rel="stylesheet" href="./assets/css/tokens.css" />
    <link rel="stylesheet" href="./assets/css/app.css" />
    <link rel="stylesheet" href="./assets/css/co-cau-to-chuc.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="app-shell" id="app-shell">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="Breadcrumb" id="breadcrumb"></nav>

      <!-- Screen 1: List (default) -->
      <section class="panel panel-main" id="screen-list">
        <div class="toolbar" id="toolbar">
          <div class="toolbar-group">
            <label for="search-input">Tim kiem</label>
            <input id="search-input" type="text" placeholder="Nhap Ma hoac Ten don vi..." />
          </div>
          <div class="toolbar-group">
            <label for="filter-loai">Loai to chuc</label>
            <select id="filter-loai">
              <option value="all">Tat ca</option>
            </select>
          </div>
          <div class="toolbar-group">
            <label for="filter-trang-thai">Trang thai</label>
            <select id="filter-trang-thai">
              <option value="all">Tat ca</option>
              <option value="dang_hoat_dong">Dang hoat dong</option>
              <option value="ngung_hoat_dong">Ngung hoat dong</option>
            </select>
          </div>
          <div class="toolbar-group toolbar-actions">
            <button id="btn-toggle-view" class="btn btn-secondary" type="button">Xem dang cay</button>
            <button id="btn-them-moi" class="btn btn-primary" type="button">Them moi</button>
          </div>
        </div>

        <div id="status-region" aria-live="polite"></div>
        <div id="table-region"></div>
        <div id="tree-region" hidden></div>
        <nav id="pagination-region" aria-label="Phan trang"></nav>
      </section>

      <!-- Screen 2: Detail (shown when #detail/{id}) -->
      <section class="panel panel-main" id="screen-detail" hidden>
        <div id="detail-region"></div>
      </section>

    </main>

    <!-- Toast -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Modal: Add/Edit form -->
    <dialog id="item-modal" class="item-modal">
      <form id="item-form" class="item-form" method="dialog" novalidate>
        <header class="item-form-header">
          <h2 id="item-form-title">Them moi don vi</h2>
          <button type="button" id="btn-close-modal" class="btn btn-text" aria-label="Dong">&#10005;</button>
        </header>

        <div class="form-grid">
          <label>
            <span>Ma don vi <span aria-hidden="true">*</span></span>
            <input id="field-ma" name="maDonVi" type="text" maxlength="30" required />
            <small data-error-for="maDonVi" class="field-error"></small>
          </label>

          <label>
            <span>Ten don vi <span aria-hidden="true">*</span></span>
            <input id="field-ten" name="tenDonVi" type="text" maxlength="120" required />
            <small data-error-for="tenDonVi" class="field-error"></small>
          </label>

          <label>
            <span>Loai to chuc <span aria-hidden="true">*</span></span>
            <select id="field-loai" name="loaiToChuc" required>
              <option value="">-- Chon loai to chuc --</option>
              <option value="don_vi_hanh_chinh">Don vi hanh chinh</option>
              <option value="don_vi_su_nghiep_cong_lap">Don vi su nghiep cong lap</option>
              <option value="to_chuc_chinh_tri_xa_hoi">To chuc chinh tri - xa hoi</option>
              <option value="to_chuc_xa_hoi_nghe_nghiep">To chuc xa hoi - nghe nghiep</option>
            </select>
            <small data-error-for="loaiToChuc" class="field-error"></small>
          </label>

          <label>
            <span>Cap quan ly <span aria-hidden="true">*</span></span>
            <select id="field-cap" name="capQuanLy" required>
              <option value="">-- Chon cap quan ly --</option>
              <option value="trung_uong">Trung uong</option>
              <option value="tinh_thanh_pho">Tinh / Thanh pho</option>
              <option value="huyen_quan">Huyen / Quan</option>
              <option value="xa_phuong_thi_tran">Xa / Phuong / Thi tran</option>
            </select>
            <small data-error-for="capQuanLy" class="field-error"></small>
          </label>

          <label>
            <span>Don vi cha</span>
            <select id="field-cha" name="donViChaId">
              <option value="">(Khong co - la goc cay)</option>
            </select>
            <small data-error-for="donViChaId" class="field-error"></small>
          </label>

          <label>
            <span>Trang thai <span aria-hidden="true">*</span></span>
            <select id="field-trang-thai-form" name="trangThaiHoatDong" required>
              <option value="dang_hoat_dong">Dang hoat dong</option>
              <option value="ngung_hoat_dong">Ngung hoat dong</option>
            </select>
            <small data-error-for="trangThaiHoatDong" class="field-error"></small>
          </label>

          <label class="form-ghi-chu">
            <span>Ghi chu</span>
            <textarea id="field-ghi-chu" name="ghiChu" maxlength="500" rows="3"></textarea>
            <small data-error-for="ghiChu" class="field-error"></small>
          </label>
        </div>

        <footer class="item-form-footer">
          <button type="button" id="btn-cancel" class="btn btn-secondary">Huy</button>
          <button type="submit" id="btn-save" class="btn btn-primary">Luu</button>
        </footer>
      </form>
    </dialog>

    <!-- Dialog: Confirmation -->
    <dialog id="confirm-dialog" class="confirm-dialog">
      <div class="confirm-content">
        <div class="confirm-icon" id="confirm-icon" aria-hidden="true">&#9888;</div>
        <h3 id="confirm-title"></h3>
        <p id="confirm-message"></p>
        <div class="confirm-actions">
          <button type="button" id="btn-confirm-cancel" class="btn btn-secondary">Huy</button>
          <button type="button" id="btn-confirm-ok" class="btn btn-danger">Xac nhan</button>
        </div>
      </div>
    </dialog>

    <script type="module" src="./assets/js/co-cau-to-chuc/app.js"></script>
  </body>
</html>
